[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary for failures and errors
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit: pure unit tests with no I/O
    integration: tests that spin up the full ASGI app
    e2e: tests that hit the real on-disk database
    schema: database schema and integrity tests
