<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecturers | University RMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { border-radius: 0 !important; }
    .r8 { border-radius: 8px !important; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    .sidebar { width: 200px; min-height: 100vh; background: #1e293b; flex-shrink: 0; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 8px 14px; color: #94a3b8;
      font-size: 0.8125rem; font-weight: 500; transition: all 0.15s; border-radius: 8px !important;
      text-decoration: none; margin: 1px 8px; }
    .nav-link:hover { background: #334155; color: #f1f5f9; }
    .nav-link.active { background: #1d4ed8; color: #fff; }
    .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal-box { background: white; border-radius: 8px !important; width: 100%; max-width: 600px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .modal-header { background: #1e293b; color: white; padding: 14px 16px; border-radius: 8px 8px 0 0 !important; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .modal-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 1.4rem; line-height: 1; cursor: pointer; padding: 0; }
    .modal-close:hover { color: white; }
    .tab-bar { display: flex; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; overflow-x: auto; }
    .tab-btn { flex: 1; padding: 8px 6px; font-size: 0.72rem; font-weight: 500; color: #6b7280; background: white; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .tab-btn:hover { color: #1e293b; background: #f1f5f9; }
    .tab-btn.active { color: #1e293b; border-bottom-color: #1e293b; font-weight: 600; }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px; font-size: 0.8125rem; }
    .selected-row { background: #f0fdf4 !important; }

    /* custom select */
    .custom-select { position: relative; }
    .custom-select-trigger {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      border: 1px solid #d1d5db; background: white; padding: 7px 12px;
      font-size: 0.75rem; color: #374151; cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-radius: 8px !important;
      user-select: none; min-width: 130px; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .custom-select-trigger:hover { border-color: #93c5fd; }
    .custom-select-trigger.open { border-color: #3b82f6; box-shadow: 0 0 0 1.5px rgba(59,130,246,0.25); }
    .custom-select-trigger svg { flex-shrink: 0; transition: transform 0.15s; color: #9ca3af; }
    .custom-select-trigger.open svg { transform: rotate(180deg); }
    .custom-select-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; min-width: 100%;
      background: white; border: 1px solid #e5e7eb;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10); z-index: 100;
      border-radius: 8px !important; overflow: hidden; padding: 3px;
    }
    .custom-select-option {
      padding: 6px 10px; font-size: 0.75rem; color: #374151;
      cursor: pointer; border-radius: 6px !important; transition: background 0.1s;
    }
    .custom-select-option:hover { background: #eff6ff; color: #1d4ed8; }
    .custom-select-option.selected { background: #dbeafe; color: #1d4ed8; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <div id="sidebarMount"></div>

  <main class="flex-1 px-6 py-5 overflow-y-auto min-w-0">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h1 class="text-lg font-bold text-gray-800 leading-tight">Lecturers</h1>
        <p class="text-gray-400 text-xs mt-0.5">Browse faculty by department, expertise, courses and committees</p>
      </div>
    </div>

    <div class="flex gap-2 mb-3 flex-wrap">
      <input id="searchInput" type="text" placeholder="Search by name, department or expertise..."
        class="flex-1 min-w-[200px] border border-gray-300 px-3 py-2 text-xs shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white r8" />
      <div class="custom-select" id="deptSelect">
        <div class="custom-select-trigger" id="deptTrigger" onclick="toggleDeptDropdown()">
          <span id="deptLabel">All departments</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="2 4 6 8 10 4"/>
          </svg>
        </div>
        <div class="custom-select-dropdown hidden" id="deptDropdown">
          <div class="custom-select-option selected" data-value="" onclick="selectDept(this)">All departments</div>
        </div>
      </div>
      <button onclick="loadLecturers()"
        class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-4 py-2 transition shadow-sm r8">Search</button>
      <button onclick="clearSearch()"
        class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-xs font-medium px-3 py-2 transition shadow-sm r8">Clear</button>
    </div>

    <div class="bg-white border border-gray-200 overflow-hidden shadow-sm r8">
      <table class="w-full text-xs">
        <thead class="bg-[#1e293b] text-slate-300 uppercase tracking-wider">
          <tr>
            <th class="px-4 py-3 text-left">ID</th>
            <th class="px-4 py-3 text-left">Name</th>
            <th class="px-4 py-3 text-left hidden md:table-cell">Email</th>
            <th class="px-4 py-3 text-left hidden lg:table-cell">Department</th>
            <th class="px-4 py-3 text-left hidden xl:table-cell">Expertise</th>
            <th class="px-4 py-3 text-center">Course Load</th>
          </tr>
        </thead>
        <tbody id="lecturerBody" class="divide-y divide-gray-100 text-gray-700">
          <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Loading...</td></tr>
        </tbody>
      </table>
      <div id="lecturerCount" class="px-4 py-2 text-xs text-gray-400 border-t border-gray-100"></div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal-backdrop hidden" onclick="handleBackdropClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <div class="font-semibold text-sm" id="modalName"></div>
          <div class="text-green-100 text-xs mt-0.5" id="modalDept"></div>
          <div class="text-green-200 text-xs font-mono" id="modalId"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('courses', this)">Courses</button>
        <button class="tab-btn" onclick="switchTab('students', this)">Advisees</button>
        <button class="tab-btn" onclick="switchTab('qualifications', this)">Qualifications</button>
        <button class="tab-btn" onclick="switchTab('committees', this)">Committees</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    fetch('/static/sidebar.html').then(r => r.text()).then(html => {
      document.getElementById('sidebarMount').outerHTML = html;
      document.querySelector('[data-page="lecturers"]')?.classList.add('active');
    });

    let selectedLecturer = null;
    let currentTab = 'courses';
    let currentDept = '';

    function toggleDeptDropdown() {
      const trigger = document.getElementById('deptTrigger');
      const dropdown = document.getElementById('deptDropdown');
      const isOpen = !dropdown.classList.contains('hidden');
      dropdown.classList.toggle('hidden', isOpen);
      trigger.classList.toggle('open', !isOpen);
    }

    function selectDept(el) {
      currentDept = el.dataset.value;
      document.getElementById('deptLabel').textContent = el.textContent;
      document.querySelectorAll('#deptDropdown .custom-select-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('deptDropdown').classList.add('hidden');
      document.getElementById('deptTrigger').classList.remove('open');
      loadLecturers();
    }

    document.addEventListener('click', e => {
      if (!document.getElementById('deptSelect').contains(e.target)) {
        document.getElementById('deptDropdown').classList.add('hidden');
        document.getElementById('deptTrigger').classList.remove('open');
      }
    });

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      currentDept = '';
      document.getElementById('deptLabel').textContent = 'All departments';
      document.querySelectorAll('#deptDropdown .custom-select-option').forEach(o => o.classList.remove('selected'));
      const allOpt = document.querySelector('#deptDropdown .custom-select-option[data-value=""]');
      if (allOpt) allOpt.classList.add('selected');
      loadLecturers();
    }

    function populateDeptDropdown(lecturers) {
      // populate once on first load using the full unfiltered list
      const depts = [...new Set(lecturers.map(l => l.department_name).filter(Boolean))].sort();
      const dropdown = document.getElementById('deptDropdown');
      dropdown.innerHTML = `<div class="custom-select-option selected" data-value="" onclick="selectDept(this)">All departments</div>`
        + depts.map(d => `<div class="custom-select-option" data-value="${d}" onclick="selectDept(this)">${d}</div>`).join('');
    }

    function loadLecturers() {
      const q = document.getElementById('searchInput').value.trim();
      const params = new URLSearchParams();
      if (q) params.set('search', q);
      if (currentDept) params.set('department', currentDept);
      const url = `/api/lecturers${params.size ? '?' + params : ''}`;
      document.getElementById('lecturerBody').innerHTML =
        `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Loading...</td></tr>`;
      fetch(url).then(r => r.json()).then(rows => renderTable(rows));
    }

    function renderTable(rows) {
      document.getElementById('lecturerCount').textContent =
        rows.length ? `${rows.length} lecturer${rows.length !== 1 ? 's' : ''}` : '';
      if (!rows.length) {
        document.getElementById('lecturerBody').innerHTML =
          `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">No lecturers found.</td></tr>`;
        return;
      }
      document.getElementById('lecturerBody').innerHTML = rows.map(l => {
        const expertiseTags = l.expertise
          ? l.expertise.split(',').slice(0, 2).map(e =>
              `<span class="bg-blue-50 text-blue-600 px-1.5 py-0.5 r8">${e.trim()}</span>`
            ).join('')
          : '-';
        return `
          <tr id="row-${l.lecturer_id}"
            class="hover:bg-green-50 cursor-pointer transition ${selectedLecturer?.lecturer_id === l.lecturer_id ? 'selected-row' : ''}"
            onclick="openModal(${JSON.stringify(l).replace(/"/g, '&quot;')})">
            <td class="px-4 py-3 font-mono text-gray-500">${l.lecturer_id}</td>
            <td class="px-4 py-3 font-medium text-gray-800">${l.name}</td>
            <td class="px-4 py-3 text-gray-500 hidden md:table-cell">${l.email}</td>
            <td class="px-4 py-3 hidden lg:table-cell">
              <span class="bg-green-50 text-green-700 font-medium px-2 py-0.5 r8">${l.department_name}</span>
            </td>
            <td class="px-4 py-3 hidden xl:table-cell">
              <div class="flex flex-wrap gap-1">${expertiseTags}</div>
            </td>
            <td class="px-4 py-3 text-center">
              <span class="bg-gray-100 text-gray-600 px-2 py-0.5 r8">${l.course_load}</span>
            </td>
          </tr>`;
      }).join('');
    }

    function openModal(l) {
      selectedLecturer = l;
      currentTab = 'courses';
      document.getElementById('modalName').textContent = l.name;
      document.getElementById('modalDept').textContent = l.department_name;
      document.getElementById('modalId').textContent = l.lecturer_id;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.getElementById('modal').classList.remove('hidden');
      loadTab('courses', l.lecturer_id);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      selectedLecturer = null;
    }

    function handleBackdropClick(e) {
      if (e.target === document.getElementById('modal')) closeModal();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (selectedLecturer) loadTab(tab, selectedLecturer.lecturer_id);
    }

    function loadTab(tab, id) {
      const content = document.getElementById('modalBody');
      content.innerHTML = '<p class="text-gray-400 text-xs">Loading...</p>';

      if (tab === 'courses') {
        fetch(`/api/lecturers/${id}/courses`)
          .then(r => r.json())
          .then(rows => {
            if (!rows.length) { content.innerHTML = emptyState('No teaching assignments found.'); return; }
            content.innerHTML = `<div class="space-y-1.5 text-xs">
              ${rows.map(r => `
                <div class="flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0">
                  <div>
                    <div class="font-medium text-gray-800">${r.course_name}</div>
                    <div class="text-gray-400 font-mono">${r.course_code} &middot; ${r.credits} cr &middot; ${r.course_level}</div>
                    <div class="text-gray-400">${r.semester}</div>
                  </div>
                </div>`).join('')}
            </div>`;
          });
        return;
      }

      if (tab === 'students') {
        fetch(`/api/lecturers/${id}/students`)
          .then(r => r.json())
          .then(rows => {
            if (!rows.length) { content.innerHTML = emptyState('No advisees assigned.'); return; }
            content.innerHTML = `<div class="space-y-1.5 text-xs">
              ${rows.map(r => `
                <div class="flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0">
                  <div>
                    <div class="font-medium text-gray-800">${r.student_name}</div>
                    <div class="text-gray-400">${r.program_name} &middot; Year ${r.year_of_study}</div>
                  </div>
                  <span class="font-mono text-gray-400">${r.student_id}</span>
                </div>`).join('')}
            </div>`;
          });
        return;
      }

      if (tab === 'qualifications') {
        fetch(`/api/lecturers/${id}/qualifications`)
          .then(r => r.json())
          .then(rows => {
            if (!rows.length) { content.innerHTML = emptyState('No qualifications recorded.'); return; }
            content.innerHTML = `<div class="space-y-2 text-xs">
              ${rows.map(r => `
                <div class="bg-indigo-50 p-2.5 r8">
                  <div class="font-medium text-indigo-800">${r.qualification}</div>
                  <div class="text-indigo-600 mt-0.5">${r.awarding_institution ?? '-'}</div>
                  <div class="text-gray-400 mt-0.5">Awarded ${r.award_year ?? '-'}</div>
                </div>`).join('')}
            </div>`;
          });
        return;
      }

      if (tab === 'committees') {
        fetch(`/api/lecturers/${id}/committees`)
          .then(r => r.json())
          .then(rows => {
            if (!rows.length) { content.innerHTML = emptyState('Not a member of any committee.'); return; }
            content.innerHTML = `<div class="space-y-2 text-xs">
              ${rows.map(r => `
                <div class="bg-orange-50 p-2.5 r8">
                  <div class="flex justify-between items-start">
                    <div class="font-medium text-orange-800">${r.committee_name}</div>
                    <span class="bg-orange-100 text-orange-700 px-2 py-0.5 ml-2 shrink-0 r8">${r.role}</span>
                  </div>
                  ${r.description ? `<div class="text-gray-500 mt-1">${r.description}</div>` : ''}
                </div>`).join('')}
            </div>`;
          });
        return;
      }
    }

    function emptyState(msg) {
      return `<div class="text-center py-6">
        <div class="text-gray-300 text-2xl mb-1.5">&#8212;</div>
        <p class="text-xs text-gray-400">${msg}</p>
      </div>`;
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadLecturers();
    });

    // on first load, fetch everything to populate the department dropdown,
    // then let subsequent loadLecturers() calls filter server-side
    fetch('/api/lecturers').then(r => r.json()).then(all => {
      populateDeptDropdown(all);
      renderTable(all);
      document.getElementById('lecturerCount').textContent =
        `${all.length} lecturer${all.length !== 1 ? 's' : ''}`;
    });
  </script>
</body>
</html>
