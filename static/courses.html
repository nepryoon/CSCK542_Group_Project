<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses | University RMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { border-radius: 0 !important; }
    .r8 { border-radius: 8px !important; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    .sidebar { width: 200px; min-height: 100vh; background: #1e293b; flex-shrink: 0; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 8px 14px; color: #94a3b8;
      font-size: 0.8125rem; font-weight: 500; transition: all 0.15s; border-radius: 8px !important;
      text-decoration: none; margin: 1px 8px; }
    .nav-link:hover { background: #334155; color: #f1f5f9; }
    .nav-link.active { background: #1d4ed8; color: #fff; }
    .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal-box { background: white; border-radius: 8px !important; width: 100%; max-width: 600px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .modal-header { background: #1e293b; color: white; padding: 14px 16px; border-radius: 8px 8px 0 0 !important; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .modal-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 1.4rem; line-height: 1; cursor: pointer; padding: 0; }
    .modal-close:hover { color: white; }
    .tab-bar { display: flex; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; overflow-x: auto; }
    .tab-btn { flex: 1; padding: 8px 6px; font-size: 0.72rem; font-weight: 500; color: #6b7280; background: white; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .tab-btn:hover { color: #1e293b; background: #f1f5f9; }
    .tab-btn.active { color: #1e293b; border-bottom-color: #1e293b; font-weight: 600; }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px; font-size: 0.8125rem; }
    .selected-row { background: #eff6ff !important; }

    .custom-select { position: relative; }
    .custom-select-trigger {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      border: 1px solid #d1d5db; background: white; padding: 7px 12px;
      font-size: 0.75rem; color: #374151; cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-radius: 8px !important;
      user-select: none; min-width: 130px; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .custom-select-trigger:hover { border-color: #93c5fd; }
    .custom-select-trigger.open { border-color: #3b82f6; box-shadow: 0 0 0 1.5px rgba(59,130,246,0.25); }
    .custom-select-trigger svg { flex-shrink: 0; transition: transform 0.15s; color: #9ca3af; }
    .custom-select-trigger.open svg { transform: rotate(180deg); }
    .custom-select-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; min-width: 100%;
      background: white; border: 1px solid #e5e7eb;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10); z-index: 100;
      border-radius: 8px !important; overflow: hidden; padding: 3px;
    }
    .custom-select-option {
      padding: 6px 10px; font-size: 0.75rem; color: #374151;
      cursor: pointer; border-radius: 6px !important; transition: background 0.1s;
    }
    .custom-select-option:hover { background: #eff6ff; color: #1d4ed8; }
    .custom-select-option.selected { background: #dbeafe; color: #1d4ed8; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <div id="sidebarMount"></div>

  <main class="flex-1 px-6 py-5 overflow-y-auto min-w-0">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h1 class="text-lg font-bold text-gray-800 leading-tight">Courses</h1>
        <p class="text-gray-400 text-xs mt-0.5">Browse courses by department, level and enrolled students</p>
      </div>
    </div>

    <div class="flex gap-2 mb-3 flex-wrap">
      <input id="searchInput" type="text" placeholder="Search by code or name..."
        class="flex-1 min-w-[200px] border border-gray-300 px-3 py-2 text-xs shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white r8" />
      <div class="custom-select" id="deptSelect">
        <div class="custom-select-trigger" id="deptTrigger" onclick="toggleDropdown('dept')">
          <span id="deptLabel">All departments</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2 4 6 8 10 4"/></svg>
        </div>
        <div class="custom-select-dropdown hidden" id="deptDropdown"></div>
      </div>
      <div class="custom-select" id="levelSelect">
        <div class="custom-select-trigger" id="levelTrigger" onclick="toggleDropdown('level')">
          <span id="levelLabel">All levels</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2 4 6 8 10 4"/></svg>
        </div>
        <div class="custom-select-dropdown hidden" id="levelDropdown"></div>
      </div>
      <button onclick="loadCourses()"
        class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-4 py-2 transition shadow-sm r8">Search</button>
      <button onclick="clearSearch()"
        class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-xs font-medium px-3 py-2 transition shadow-sm r8">Clear</button>
    </div>

    <div class="bg-white border border-gray-200 overflow-hidden shadow-sm r8">
      <table class="w-full text-xs">
        <thead class="bg-[#1e293b] text-slate-300 uppercase tracking-wider">
          <tr>
            <th class="px-4 py-3 text-left">Code</th>
            <th class="px-4 py-3 text-left">Name</th>
            <th class="px-4 py-3 text-left hidden md:table-cell">Department</th>
            <th class="px-4 py-3 text-left hidden lg:table-cell">Level</th>
            <th class="px-4 py-3 text-center hidden lg:table-cell">Credits</th>
            <th class="px-4 py-3 text-center">Enrolled</th>
          </tr>
        </thead>
        <tbody id="courseBody" class="divide-y divide-gray-100 text-gray-700">
          <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Loading...</td></tr>
        </tbody>
      </table>
      <div id="courseCount" class="px-4 py-2 text-xs text-gray-400 border-t border-gray-100"></div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal-backdrop hidden" onclick="handleBackdropClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <div class="font-semibold text-sm" id="modalName"></div>
          <div class="text-slate-300 text-xs mt-0.5" id="modalDept"></div>
          <div class="text-slate-400 text-xs font-mono" id="modalCode"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('enrolments', this)">Enrolments</button>
        <button class="tab-btn" onclick="switchTab('lecturers', this)">Lecturers</button>
        <button class="tab-btn" onclick="switchTab('info', this)">Info</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    fetch('/static/sidebar.html').then(r => r.text()).then(html => {
      document.getElementById('sidebarMount').outerHTML = html;
      document.querySelector('[data-page="courses"]')?.classList.add('active');
    });

    let selectedCourse = null;
    let currentDept = '';
    let currentLevel = '';

    function toggleDropdown(which) {
      const trigger = document.getElementById(which + 'Trigger');
      const dropdown = document.getElementById(which + 'Dropdown');
      const isOpen = !dropdown.classList.contains('hidden');
      dropdown.classList.toggle('hidden', isOpen);
      trigger.classList.toggle('open', !isOpen);
    }

    document.addEventListener('click', e => {
      ['dept', 'level'].forEach(which => {
        const sel = document.getElementById(which + 'Select');
        if (sel && !sel.contains(e.target)) {
          document.getElementById(which + 'Dropdown').classList.add('hidden');
          document.getElementById(which + 'Trigger').classList.remove('open');
        }
      });
    });

    function selectDept(el) {
      currentDept = el.dataset.value;
      document.getElementById('deptLabel').textContent = el.textContent;
      document.querySelectorAll('#deptDropdown .custom-select-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('deptDropdown').classList.add('hidden');
      document.getElementById('deptTrigger').classList.remove('open');
      loadCourses();
    }

    function selectLevel(el) {
      currentLevel = el.dataset.value;
      document.getElementById('levelLabel').textContent = el.textContent;
      document.querySelectorAll('#levelDropdown .custom-select-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('levelDropdown').classList.add('hidden');
      document.getElementById('levelTrigger').classList.remove('open');
      loadCourses();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      currentDept = '';
      currentLevel = '';
      document.getElementById('deptLabel').textContent = 'All departments';
      document.getElementById('levelLabel').textContent = 'All levels';
      document.querySelectorAll('.custom-select-option').forEach(o => o.classList.remove('selected'));
      document.querySelector('#deptDropdown .custom-select-option[data-value=""]')?.classList.add('selected');
      document.querySelector('#levelDropdown .custom-select-option[data-value=""]')?.classList.add('selected');
      loadCourses();
    }

    function populateDropdowns(courses) {
      const depts = [...new Set(courses.map(c => c.department_name).filter(Boolean))].sort();
      document.getElementById('deptDropdown').innerHTML =
        `<div class="custom-select-option selected" data-value="" onclick="selectDept(this)">All departments</div>`
        + depts.map(d => `<div class="custom-select-option" data-value="${d}" onclick="selectDept(this)">${d}</div>`).join('');

      const levels = [...new Set(courses.map(c => c.course_level).filter(Boolean))].sort();
      document.getElementById('levelDropdown').innerHTML =
        `<div class="custom-select-option selected" data-value="" onclick="selectLevel(this)">All levels</div>`
        + levels.map(l => `<div class="custom-select-option" data-value="${l}" onclick="selectLevel(this)">${l}</div>`).join('');
    }

    function loadCourses() {
      const q = document.getElementById('searchInput').value.trim();
      const params = new URLSearchParams();
      if (q) params.set('search', q);
      if (currentDept) params.set('department', currentDept);
      if (currentLevel) params.set('level', currentLevel);
      const url = `/api/courses${params.size ? '?' + params : ''}`;
      document.getElementById('courseBody').innerHTML =
        `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Loading...</td></tr>`;
      fetch(url).then(r => r.json()).then(rows => renderTable(rows));
    }

    function renderTable(rows) {
      document.getElementById('courseCount').textContent =
        rows.length ? `${rows.length} course${rows.length !== 1 ? 's' : ''}` : '';
      if (!rows.length) {
        document.getElementById('courseBody').innerHTML =
          `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">No courses found.</td></tr>`;
        return;
      }
      document.getElementById('courseBody').innerHTML = rows.map(c => `
        <tr id="row-${c.course_code}"
          class="hover:bg-blue-50 cursor-pointer transition ${selectedCourse?.course_code === c.course_code ? 'selected-row' : ''}"
          onclick="openModal(${JSON.stringify(c).replace(/"/g, '&quot;')})">
          <td class="px-4 py-3 font-mono text-gray-500">${c.course_code}</td>
          <td class="px-4 py-3 font-medium text-gray-800">${c.course_name}</td>
          <td class="px-4 py-3 hidden md:table-cell">
            <span class="bg-purple-50 text-purple-700 font-medium px-2 py-0.5 r8">${c.department_name}</span>
          </td>
          <td class="px-4 py-3 hidden lg:table-cell">
            <span class="bg-gray-100 text-gray-600 px-2 py-0.5 r8">${c.course_level}</span>
          </td>
          <td class="px-4 py-3 text-center hidden lg:table-cell">${c.credits}</td>
          <td class="px-4 py-3 text-center">
            <span class="bg-blue-50 text-blue-700 px-2 py-0.5 r8">${c.enrolled ?? 0}</span>
          </td>
        </tr>`).join('');
    }

    function openModal(c) {
      selectedCourse = c;
      document.getElementById('modalName').textContent = c.course_name;
      document.getElementById('modalDept').textContent = c.department_name;
      document.getElementById('modalCode').textContent = c.course_code + ' · ' + c.credits + ' credits · ' + c.course_level;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.getElementById('modal').classList.remove('hidden');
      loadTab('enrolments', c.course_code);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      selectedCourse = null;
    }

    function handleBackdropClick(e) {
      if (e.target === document.getElementById('modal')) closeModal();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (selectedCourse) loadTab(tab, selectedCourse.course_code);
    }

    function loadTab(tab, code) {
      const content = document.getElementById('modalBody');
      content.innerHTML = '<p class="text-gray-400 text-xs">Loading...</p>';

      if (tab === 'enrolments') {
        fetch(`/api/courses/${code}/enrolments`).then(r => r.json()).then(rows => {
          if (!rows.length) { content.innerHTML = emptyState('No enrolments found.'); return; }
          content.innerHTML = `<div class="space-y-1.5 text-xs">
            ${rows.map(r => `
              <div class="flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0">
                <div>
                  <div class="font-medium text-gray-800">${r.student_name}</div>
                  <div class="text-gray-400">${r.semester}</div>
                </div>
                <div class="text-right">
                  <span class="font-mono text-gray-400">${r.student_id}</span>
                  ${r.grade != null ? `<div class="text-blue-600 font-semibold">${r.grade}</div>` : '<div class="text-gray-300">-</div>'}
                </div>
              </div>`).join('')}
          </div>`;
        });
        return;
      }

      if (tab === 'lecturers') {
        fetch(`/api/courses/${code}/lecturers`).then(r => r.json()).then(rows => {
          if (!rows.length) { content.innerHTML = emptyState('No lecturers assigned.'); return; }
          content.innerHTML = `<div class="space-y-1.5 text-xs">
            ${rows.map(r => `
              <div class="flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0">
                <div>
                  <div class="font-medium text-gray-800">${r.lecturer_name}</div>
                  <div class="text-gray-400">${r.semester}</div>
                </div>
                <span class="font-mono text-gray-400">${r.lecturer_id}</span>
              </div>`).join('')}
          </div>`;
        });
        return;
      }

      if (tab === 'info') {
        const c = selectedCourse;
        content.innerHTML = `<div class="space-y-3 text-xs">
          ${c.description ? `<div class="bg-gray-50 p-3 r8 text-gray-600">${c.description}</div>` : ''}
          ${c.schedule ? `<div><span class="font-medium text-gray-700">Schedule:</span> <span class="text-gray-500">${c.schedule}</span></div>` : ''}
          ${c.materials ? `<div><span class="font-medium text-gray-700">Materials:</span> <span class="text-gray-500">${c.materials}</span></div>` : ''}
          ${!c.description && !c.schedule && !c.materials ? emptyState('No additional info recorded.') : ''}
        </div>`;
      }
    }

    function emptyState(msg) {
      return `<div class="text-center py-6">
        <div class="text-gray-300 text-2xl mb-1.5">&#8212;</div>
        <p class="text-xs text-gray-400">${msg}</p>
      </div>`;
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadCourses();
    });

    fetch('/api/courses').then(r => r.json()).then(all => {
      populateDropdowns(all);
      renderTable(all);
      document.getElementById('courseCount').textContent =
        `${all.length} course${all.length !== 1 ? 's' : ''}`;
    });
  </script>
</body>
</html>
