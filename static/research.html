<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research | University RMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { border-radius: 0 !important; }
    .r8 { border-radius: 8px !important; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    .sidebar { width: 200px; min-height: 100vh; background: #1e293b; flex-shrink: 0; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 8px 14px; color: #94a3b8;
      font-size: 0.8125rem; font-weight: 500; transition: all 0.15s; border-radius: 8px !important;
      text-decoration: none; margin: 1px 8px; }
    .nav-link:hover { background: #334155; color: #f1f5f9; }
    .nav-link.active { background: #1d4ed8; color: #fff; }
    .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal-box { background: white; border-radius: 8px !important; width: 100%; max-width: 600px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .modal-header { background: #1e293b; color: white; padding: 14px 16px; border-radius: 8px 8px 0 0 !important; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .modal-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 1.4rem; line-height: 1; cursor: pointer; padding: 0; }
    .modal-close:hover { color: white; }
    .tab-bar { display: flex; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
    .tab-btn { flex: 1; padding: 8px 6px; font-size: 0.72rem; font-weight: 500; color: #6b7280; background: white; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
    .tab-btn:hover { color: #1e293b; background: #f1f5f9; }
    .tab-btn.active { color: #1e293b; border-bottom-color: #1e293b; font-weight: 600; }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px; font-size: 0.8125rem; }

    /* custom select */
    .custom-select { position: relative; }
    .custom-select-trigger {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      border: 1px solid #d1d5db; background: white; padding: 7px 12px;
      font-size: 0.75rem; color: #374151; cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-radius: 8px !important;
      user-select: none; min-width: 130px; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .custom-select-trigger:hover { border-color: #93c5fd; }
    .custom-select-trigger.open { border-color: #3b82f6; box-shadow: 0 0 0 1.5px rgba(59,130,246,0.25); }
    .custom-select-trigger svg { flex-shrink: 0; transition: transform 0.15s; color: #9ca3af; }
    .custom-select-trigger.open svg { transform: rotate(180deg); }
    .custom-select-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; min-width: 100%;
      background: white; border: 1px solid #e5e7eb;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10); z-index: 100;
      border-radius: 8px !important; overflow: hidden; padding: 3px;
    }
    .custom-select-option {
      padding: 6px 10px; font-size: 0.75rem; color: #374151;
      cursor: pointer; border-radius: 6px !important; transition: background 0.1s;
    }
    .custom-select-option:hover { background: #eff6ff; color: #1d4ed8; }
    .custom-select-option.selected { background: #dbeafe; color: #1d4ed8; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <div id="sidebarMount"></div>

  <main class="flex-1 px-6 py-5 overflow-y-auto min-w-0">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h1 class="text-lg font-bold text-gray-800 leading-tight">Research Projects</h1>
        <p class="text-gray-400 text-xs mt-0.5">Active and completed projects, team members and publications</p>
      </div>
    </div>

    <div class="flex gap-2 mb-3 flex-wrap">
      <input id="searchInput" type="text" placeholder="Search by title, PI, department or funding source..."
        class="flex-1 min-w-[200px] border border-gray-300 px-3 py-2 text-xs shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white r8" />
      <div class="custom-select" id="outcomeSelect">
        <div class="custom-select-trigger" id="outcomeTrigger" onclick="toggleOutcomeDropdown()">
          <span id="outcomeLabel">All statuses</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="2 4 6 8 10 4"/>
          </svg>
        </div>
        <div class="custom-select-dropdown hidden" id="outcomeDropdown">
          <div class="custom-select-option selected" data-value="" onclick="selectOutcome(this)">All statuses</div>
          <div class="custom-select-option" data-value="Ongoing" onclick="selectOutcome(this)">Ongoing</div>
          <div class="custom-select-option" data-value="Prototype completed" onclick="selectOutcome(this)">Prototype completed</div>
          <div class="custom-select-option" data-value="Final report submitted" onclick="selectOutcome(this)">Final report submitted</div>
        </div>
      </div>
      <button onclick="loadProjects()"
        class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-4 py-2 transition shadow-sm r8">Search</button>
      <button onclick="clearSearch()"
        class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-xs font-medium px-3 py-2 transition shadow-sm r8">Clear</button>
    </div>

    <div class="bg-white border border-gray-200 overflow-hidden shadow-sm r8">
      <table class="w-full text-xs">
        <thead class="bg-[#1e293b] text-slate-300 uppercase tracking-wider">
          <tr>
            <th class="px-4 py-3 text-left">ID</th>
            <th class="px-4 py-3 text-left">Title</th>
            <th class="px-4 py-3 text-left hidden md:table-cell">PI</th>
            <th class="px-4 py-3 text-left hidden lg:table-cell">Department</th>
            <th class="px-4 py-3 text-left hidden xl:table-cell">Funding</th>
            <th class="px-4 py-3 text-left">Status</th>
            <th class="px-4 py-3 text-center hidden md:table-cell">Members</th>
          </tr>
        </thead>
        <tbody id="projectBody" class="divide-y divide-gray-100 text-gray-700">
          <tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">Loading...</td></tr>
        </tbody>
      </table>
      <div id="projectCount" class="px-4 py-2 text-xs text-gray-400 border-t border-gray-100"></div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal-backdrop hidden" onclick="handleBackdropClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <div class="flex-1 min-w-0 pr-3">
          <div class="font-semibold text-sm leading-snug" id="modalTitle"></div>
          <div class="text-slate-300 text-xs font-mono mt-1" id="modalId"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('members', this)">Team</button>
        <button class="tab-btn" onclick="switchTab('publications', this)">Publications</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    fetch('/static/sidebar.html').then(r => r.text()).then(html => {
      document.getElementById('sidebarMount').outerHTML = html;
      document.querySelector('[data-page="research"]')?.classList.add('active');
    });

    let selectedProject = null;
    let currentTab = 'members';
    let currentOutcome = '';

    function toggleOutcomeDropdown() {
      const trigger = document.getElementById('outcomeTrigger');
      const dropdown = document.getElementById('outcomeDropdown');
      const isOpen = !dropdown.classList.contains('hidden');
      dropdown.classList.toggle('hidden', isOpen);
      trigger.classList.toggle('open', !isOpen);
    }

    function selectOutcome(el) {
      currentOutcome = el.dataset.value;
      document.getElementById('outcomeLabel').textContent = el.textContent;
      document.querySelectorAll('#outcomeDropdown .custom-select-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('outcomeDropdown').classList.add('hidden');
      document.getElementById('outcomeTrigger').classList.remove('open');
      loadProjects();
    }

    document.addEventListener('click', e => {
      if (!document.getElementById('outcomeSelect').contains(e.target)) {
        document.getElementById('outcomeDropdown').classList.add('hidden');
        document.getElementById('outcomeTrigger').classList.remove('open');
      }
    });

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      currentOutcome = '';
      document.getElementById('outcomeLabel').textContent = 'All statuses';
      document.querySelectorAll('#outcomeDropdown .custom-select-option').forEach(o => o.classList.remove('selected'));
      document.querySelector('#outcomeDropdown .custom-select-option[data-value=""]').classList.add('selected');
      loadProjects();
    }

    function outcomeBadge(outcome) {
      if (!outcome) return '';
      const map = {
        'Ongoing':                'bg-blue-100 text-blue-700',
        'Prototype completed':    'bg-green-100 text-green-700',
        'Final report submitted': 'bg-amber-100 text-amber-700',
      };
      const cls = map[outcome] ?? 'bg-gray-100 text-gray-600';
      return `<span class="inline-block text-xs font-medium px-2 py-0.5 r8 ${cls}">${outcome}</span>`;
    }

    function loadProjects() {
      const q = document.getElementById('searchInput').value.trim();
      const params = new URLSearchParams();
      if (q) params.set('search', q);
      if (currentOutcome) params.set('outcome', currentOutcome);
      const url = `/api/research${params.size ? '?' + params : ''}`;
      document.getElementById('projectBody').innerHTML =
        `<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">Loading...</td></tr>`;
      fetch(url).then(r => r.json()).then(rows => renderTable(rows));
    }

    function renderTable(rows) {
      document.getElementById('projectCount').textContent =
        rows.length ? `${rows.length} project${rows.length !== 1 ? 's' : ''}` : '';
      if (!rows.length) {
        document.getElementById('projectBody').innerHTML =
          `<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">No research projects found.</td></tr>`;
        return;
      }
      document.getElementById('projectBody').innerHTML = rows.map(p => `
        <tr class="hover:bg-slate-50 cursor-pointer transition"
          onclick="openModal(${JSON.stringify(p).replace(/"/g, '&quot;')})">
          <td class="px-4 py-3 font-mono text-gray-500">${p.project_id}</td>
          <td class="px-4 py-3 font-medium text-gray-800">${p.project_title}</td>
          <td class="px-4 py-3 text-gray-600 hidden md:table-cell">${p.principal_investigator}</td>
          <td class="px-4 py-3 text-gray-600 hidden lg:table-cell">${p.department_name}</td>
          <td class="px-4 py-3 text-gray-500 hidden xl:table-cell">${p.funding_source ?? '-'}</td>
          <td class="px-4 py-3">${outcomeBadge(p.outcome)}</td>
          <td class="px-4 py-3 text-center hidden md:table-cell">
            <span class="bg-gray-100 text-gray-500 px-2 py-0.5 r8">${p.lecturer_count + p.student_count}</span>
          </td>
        </tr>`).join('');
    }

    function openModal(p) {
      selectedProject = p;
      currentTab = 'members';
      document.getElementById('modalTitle').textContent = p.project_title;
      document.getElementById('modalId').textContent = p.project_id;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.getElementById('modal').classList.remove('hidden');
      loadTab('members', p.project_id);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      selectedProject = null;
    }

    function handleBackdropClick(e) {
      if (e.target === document.getElementById('modal')) closeModal();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (selectedProject) loadTab(tab, selectedProject.project_id);
    }

    function loadTab(tab, id) {
      const content = document.getElementById('modalBody');
      content.innerHTML = '<p class="text-gray-400 text-xs">Loading...</p>';

      if (tab === 'members') {
        fetch(`/api/research/${id}/members`)
          .then(r => r.json())
          .then(rows => {
            if (!rows.length) { content.innerHTML = emptyState('No team members found.'); return; }
            const lecturers = rows.filter(r => r.member_type === 'Lecturer');
            const students = rows.filter(r => r.member_type === 'Student');
            content.innerHTML = `
              ${lecturers.length ? `
                <div class="mb-3">
                  <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Lecturers</div>
                  <div class="space-y-1.5 text-xs">
                    ${lecturers.map(r => `
                      <div class="flex items-center justify-between bg-green-50 px-3 py-2 r8">
                        <span class="font-medium text-green-800">${r.member_name}</span>
                        <span class="text-green-600 bg-green-100 px-2 py-0.5 r8">${r.role}</span>
                      </div>`).join('')}
                  </div>
                </div>` : ''}
              ${students.length ? `
                <div>
                  <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Students</div>
                  <div class="space-y-1.5 text-xs">
                    ${students.map(r => `
                      <div class="flex items-center justify-between bg-blue-50 px-3 py-2 r8">
                        <span class="font-medium text-blue-800">${r.member_name}</span>
                        <span class="text-blue-600 bg-blue-100 px-2 py-0.5 r8">${r.role}</span>
                      </div>`).join('')}
                  </div>
                </div>` : ''}`;
          });
        return;
      }

      if (tab === 'publications') {
        fetch(`/api/research/${id}/publications`)
          .then(r => r.json())
          .then(rows => {
            if (!rows.length) { content.innerHTML = emptyState('No publications linked to this project.'); return; }
            content.innerHTML = `<div class="space-y-2 text-xs">
              ${rows.map(r => `
                <div class="bg-indigo-50 p-2.5 border border-indigo-100 r8">
                  <div class="font-medium text-indigo-800 leading-snug">${r.title}</div>
                  <div class="text-indigo-600 mt-1">${r.author} &middot; ${r.publication_year}</div>
                  <div class="text-gray-400 mt-0.5">${r.publication_type}</div>
                </div>`).join('')}
            </div>`;
          });
        return;
      }
    }

    function emptyState(msg) {
      return `<div class="text-center py-6">
        <div class="text-gray-300 text-2xl mb-1.5">&#8212;</div>
        <p class="text-xs text-gray-400">${msg}</p>
      </div>`;
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadProjects();
    });

    loadProjects();
  </script>
</body>
</html>
