<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Departments | University RMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { border-radius: 0 !important; }
    .r8 { border-radius: 8px !important; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    .sidebar { width: 200px; min-height: 100vh; background: #1e293b; flex-shrink: 0; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 8px 14px; color: #94a3b8;
      font-size: 0.8125rem; font-weight: 500; transition: all 0.15s; border-radius: 8px !important;
      text-decoration: none; margin: 1px 8px; }
    .nav-link:hover { background: #334155; color: #f1f5f9; }
    .nav-link.active { background: #1d4ed8; color: #fff; }
    .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal-box { background: white; border-radius: 8px !important; width: 100%; max-width: 620px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .modal-header { background: #1e293b; color: white; padding: 14px 16px; border-radius: 8px 8px 0 0 !important; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .modal-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 1.4rem; line-height: 1; cursor: pointer; padding: 0; }
    .modal-close:hover { color: white; }
    .tab-bar { display: flex; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; overflow-x: auto; }
    .tab-btn { flex: 1; padding: 8px 6px; font-size: 0.72rem; font-weight: 500; color: #6b7280; background: white; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .tab-btn:hover { color: #1e293b; background: #f1f5f9; }
    .tab-btn.active { color: #1e293b; border-bottom-color: #1e293b; font-weight: 600; }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px; font-size: 0.8125rem; }
    .selected-row { background: #fdf4ff !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <div id="sidebarMount"></div>

  <main class="flex-1 px-6 py-5 overflow-y-auto min-w-0">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h1 class="text-lg font-bold text-gray-800 leading-tight">Departments</h1>
        <p class="text-gray-400 text-xs mt-0.5">Browse departments with their programs, staff and research areas</p>
      </div>
    </div>

    <div class="flex gap-2 mb-3 flex-wrap">
      <input id="searchInput" type="text" placeholder="Search by department or faculty..."
        class="flex-1 min-w-[200px] border border-gray-300 px-3 py-2 text-xs shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white r8" />
      <button onclick="loadDepartments()"
        class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-4 py-2 transition shadow-sm r8">Search</button>
      <button onclick="clearSearch()"
        class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-xs font-medium px-3 py-2 transition shadow-sm r8">Clear</button>
    </div>

    <div class="bg-white border border-gray-200 overflow-hidden shadow-sm r8">
      <table class="w-full text-xs">
        <thead class="bg-[#1e293b] text-slate-300 uppercase tracking-wider">
          <tr>
            <th class="px-4 py-3 text-left">ID</th>
            <th class="px-4 py-3 text-left">Department</th>
            <th class="px-4 py-3 text-left hidden md:table-cell">Faculty</th>
            <th class="px-4 py-3 text-center hidden lg:table-cell">Programs</th>
            <th class="px-4 py-3 text-center hidden lg:table-cell">Lecturers</th>
            <th class="px-4 py-3 text-center">Staff</th>
          </tr>
        </thead>
        <tbody id="deptBody" class="divide-y divide-gray-100 text-gray-700">
          <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Loading...</td></tr>
        </tbody>
      </table>
      <div id="deptCount" class="px-4 py-2 text-xs text-gray-400 border-t border-gray-100"></div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal-backdrop hidden" onclick="handleBackdropClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <div class="font-semibold text-sm" id="modalName"></div>
          <div class="text-slate-300 text-xs mt-0.5" id="modalFaculty"></div>
          <div class="text-slate-400 text-xs font-mono" id="modalId"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('programs', this)">Programs</button>
        <button class="tab-btn" onclick="switchTab('staff', this)">Non-Academic Staff</button>
        <button class="tab-btn" onclick="switchTab('info', this)">Research Areas</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    fetch('/static/sidebar.html').then(r => r.text()).then(html => {
      document.getElementById('sidebarMount').outerHTML = html;
      document.querySelector('[data-page="departments"]')?.classList.add('active');
    });

    let selectedDept = null;

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      loadDepartments();
    }

    function loadDepartments() {
      const q = document.getElementById('searchInput').value.trim();
      const params = new URLSearchParams();
      if (q) params.set('search', q);
      const url = `/api/departments${params.size ? '?' + params : ''}`;
      document.getElementById('deptBody').innerHTML =
        `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Loading...</td></tr>`;
      fetch(url).then(r => r.json()).then(rows => renderTable(rows));
    }

    function renderTable(rows) {
      document.getElementById('deptCount').textContent =
        rows.length ? `${rows.length} department${rows.length !== 1 ? 's' : ''}` : '';
      if (!rows.length) {
        document.getElementById('deptBody').innerHTML =
          `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">No departments found.</td></tr>`;
        return;
      }
      document.getElementById('deptBody').innerHTML = rows.map(d => `
        <tr id="row-${d.department_id}"
          class="hover:bg-purple-50 cursor-pointer transition ${selectedDept?.department_id === d.department_id ? 'selected-row' : ''}"
          onclick="openModal(${JSON.stringify(d).replace(/"/g, '&quot;')})">
          <td class="px-4 py-3 font-mono text-gray-500">${d.department_id}</td>
          <td class="px-4 py-3 font-medium text-gray-800">${d.department_name}</td>
          <td class="px-4 py-3 hidden md:table-cell">
            <span class="bg-purple-50 text-purple-700 font-medium px-2 py-0.5 r8">${d.faculty}</span>
          </td>
          <td class="px-4 py-3 text-center hidden lg:table-cell">
            <span class="bg-blue-50 text-blue-700 px-2 py-0.5 r8">${d.program_count ?? 0}</span>
          </td>
          <td class="px-4 py-3 text-center hidden lg:table-cell">
            <span class="bg-green-50 text-green-700 px-2 py-0.5 r8">${d.lecturer_count ?? 0}</span>
          </td>
          <td class="px-4 py-3 text-center">
            <span class="bg-orange-50 text-orange-700 px-2 py-0.5 r8">${d.staff_count ?? 0}</span>
          </td>
        </tr>`).join('');
    }

    function openModal(d) {
      selectedDept = d;
      document.getElementById('modalName').textContent = d.department_name;
      document.getElementById('modalFaculty').textContent = d.faculty;
      document.getElementById('modalId').textContent = d.department_id;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.getElementById('modal').classList.remove('hidden');
      loadTab('programs', d.department_id);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      selectedDept = null;
    }

    function handleBackdropClick(e) {
      if (e.target === document.getElementById('modal')) closeModal();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (selectedDept) loadTab(tab, selectedDept.department_id);
    }

    function loadTab(tab, id) {
      const content = document.getElementById('modalBody');
      content.innerHTML = '<p class="text-gray-400 text-xs">Loading...</p>';

      if (tab === 'programs') {
        fetch(`/api/departments/${id}/programs`).then(r => r.json()).then(rows => {
          if (!rows.length) { content.innerHTML = emptyState('No programs in this department.'); return; }
          content.innerHTML = `<div class="space-y-2 text-xs">
            ${rows.map(r => `
              <div class="bg-blue-50 p-2.5 r8">
                <div class="flex justify-between items-start">
                  <div class="font-medium text-blue-800">${r.program_name}</div>
                  <span class="bg-blue-100 text-blue-700 px-2 py-0.5 ml-2 shrink-0 r8">${r.degree_awarded}</span>
                </div>
                <div class="text-gray-500 mt-0.5">${r.duration_years} year${r.duration_years !== 1 ? 's' : ''}</div>
                ${r.enrolment_details ? `<div class="text-gray-400 mt-0.5">${r.enrolment_details}</div>` : ''}
              </div>`).join('')}
          </div>`;
        });
        return;
      }

      if (tab === 'staff') {
        fetch(`/api/departments/${id}/staff`).then(r => r.json()).then(rows => {
          if (!rows.length) { content.innerHTML = emptyState('No non-academic staff in this department.'); return; }
          content.innerHTML = `<div class="space-y-1.5 text-xs">
            ${rows.map(r => `
              <div class="flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0">
                <div>
                  <div class="font-medium text-gray-800">${r.staff_name}</div>
                  <div class="text-gray-400">${r.job_title}</div>
                </div>
                <span class="bg-orange-50 text-orange-700 px-2 py-0.5 r8">${r.employment_type}</span>
              </div>`).join('')}
          </div>`;
        });
        return;
      }

      if (tab === 'info') {
        const d = selectedDept;
        const areas = Array.isArray(d.research_areas) ? d.research_areas : [];
        if (!areas.length) {
          content.innerHTML = emptyState('No research areas recorded.');
          return;
        }
        content.innerHTML = `<div class="flex flex-wrap gap-1.5 p-1">
          ${areas.map(a =>
            `<span class="bg-purple-50 text-purple-700 px-2.5 py-1 text-xs r8">${a}</span>`
          ).join('')}
        </div>`;
      }
    }

    function emptyState(msg) {
      return `<div class="text-center py-6">
        <div class="text-gray-300 text-2xl mb-1.5">&#8212;</div>
        <p class="text-xs text-gray-400">${msg}</p>
      </div>`;
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadDepartments();
    });

    fetch('/api/departments').then(r => r.json()).then(all => {
      renderTable(all);
      document.getElementById('deptCount').textContent =
        `${all.length} department${all.length !== 1 ? 's' : ''}`;
    });
  </script>
</body>
</html>
